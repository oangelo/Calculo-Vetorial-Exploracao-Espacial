  <strong>SEÇÃO III — INTEGRAÇÃO POR PARTES</strong><br>
  <span style="font-size:0.9em; font-style:italic; color:#555;">
  Quando o integrando é um produto de funções e a substituição simples não resolve,
  a integração por partes (\(\int u\,dv = uv - \int v\,du\)) nos permite
  "transferir" a dificuldade de uma função para outra. A escolha de \(u\) e \(dv\)
  é a habilidade-chave.</span>
</li>
