<div class="context">
              ORIGEM: Painel Solar Rotativo – Skylab [JAN/1974]
            </div>
<p>
              Paraboloide elíptica \(z=\dfrac{x^2+4y^2}{4}\). Plano tangente em
              \(P=(1,1,\tfrac54)\).
            </p>
<details>
<summary>RELATÓRIO DE CÁLCULO [SIGMA-4 REQUERIDO]</summary>
<div class="solution">
                \(f_x=\tfrac{x}{2},\;f_y=2y\Rightarrow(0.5,2).\;z-\tfrac54=0.5(x-1)+2(y-1)\).
              </div>
</details>
