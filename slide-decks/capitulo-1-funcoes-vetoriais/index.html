<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Funções Vetoriais - Cálculo Vetorial</title>
    <link rel="stylesheet" href="../reveal.js/dist/reveal.css" />
    <link rel="stylesheet" href="../space-theme.css" />
    <script src="../reveal.js/dist/reveal.js"></script>
    <script src="../reveal.js/plugin/math/math.js"></script>
    <style>
      .canvas-container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 400px;
      }

      .side-by-side {
        display: flex;
        justify-content: space-around;
      }

      .side-by-side div {
        width: 45%;
      }

      .img-container {
        display: flex;
        justify-content: center;
        margin: 20px 0;
      }

      .interactive-controls {
        display: flex;
        justify-content: center;
        margin-top: 10px;
      }

      .slider {
        width: 200px;
        margin: 0 10px;
      }

      .equation-highlight {
        color: var(--accent-color);
        font-weight: bold;
      }

      .note {
        font-size: 0.8em;
        font-style: italic;
        margin-top: 20px;
      }

      .visualization-canvas {
        max-width: 100%;
        height: auto;
        background-color: #1a1a2e;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }

      .reveal section {
        overflow: visible;
      }

      .reveal .slides {
        overflow: visible;
      }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides" id="slides-container"></div>
    </div>

    <script>
      async function loadSlides() {
        const sections = [
          '01-titulo.html',
          '02-funcoes-vetoriais.html',
          '03-campo-vetorial.html',
          '04-limite-continuidade.html',
          '05-derivadas-parciais.html',
          '06-rotacional.html',
          '07-divergente.html',
        ];

        const container = document.getElementById('slides-container');

        for (const sectionFile of sections) {
          try {
            const response = await fetch(sectionFile);
            if (!response.ok) {
              throw new Error(`Failed to load ${sectionFile}`);
            }

            const html = await response.text();

            // Parse HTML e extrair <section>
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // Extrair scripts do fragmento antes de injetar
            const scriptTags = doc.querySelectorAll('script[src]');
            for (const script of scriptTags) {
              const src = script.getAttribute('src');
              if (src) {
                // Criar e inserir script no head principal
                const newScript = document.createElement('script');
                newScript.src = src;
                document.head.appendChild(newScript);
              }
            }

            // Extrair o conteúdo inline dos script tags sem src
            const inlineScripts = doc.querySelectorAll('script:not([src])');
            
            const sections = doc.querySelectorAll('body > section');

            // Inserir cada seção no container
            sections.forEach((section) => {
              container.appendChild(section);
            });

            // Executar scripts inline manualmente após a injeção do DOM
            for (const script of inlineScripts) {
              const scriptContent = script.textContent;
              if (scriptContent.trim()) {
                const newScript = document.createElement('script');
                newScript.textContent = scriptContent;
                document.body.appendChild(newScript);
              }
            }

          } catch (error) {
            console.error(`Error loading ${sectionFile}:`, error);
          }
        }

        // Inicializar Reveal.js após carregar todas as seções
        const revealInstance = await Reveal.initialize({
          controls: true,
          progress: true,
          center: true,
          hash: true,
          plugins: [RevealMath.MathJax3],
        });

        // Após inicialização, chamar init() de qualquer viz que existam
        setTimeout(function() {
          if (window.lagrangeViz) window.lagrangeViz.init();
        }, 100);
      }

      // Carregar slides quando a página carregar
      window.addEventListener('load', loadSlides);
    </script>
  </body>
</html>
