        espacial
      </h3>
      <div class="math-section">
        <p>
          \[\iint_R f(x,y)\,dA = \iint_S f(x(u,v),
          y(u,v))\left|\frac{\partial(x,y)}{\partial(u,v)}\right|\,du\,dv\]
        </p>
